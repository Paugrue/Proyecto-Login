<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Restablecer contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#121212; color:#fff; margin:0; }
    .container { max-width: 460px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.25rem; margin-bottom: 6px; color:#3ecf8e; }
    p { opacity: .9; }
    form { margin-top: 16px; display: grid; gap: 12px; }
    label { font-weight: 600; display:block; margin-bottom:4px; }
    input[type="password"] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background:#0d0d0d; color:#fff; }
    button { padding: 10px 14px; border-radius: 8px; border: none; background: #3ecf8e; color: #000; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .alert { margin-top: 12px; padding: 10px 12px; border-radius: 8px; }
    .ok { background: #10b98122; border: 1px solid #10b98166; }
    .err { background: #ef444422; border: 1px solid #ef444466; }
    .hint { font-size: .95rem; opacity: .9; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Restablecer contraseña</h1>
    <p class="hint">Si has llegado aquí desde el correo de recuperación, introduce tu nueva contraseña.</p>

    <div id="status" class="alert hidden"></div>

    <form id="reset-form" class="hidden" autocomplete="off">
      <div>
        <label for="password">Nueva contraseña</label>
        <input id="password" name="password" type="password" minlength="8" required placeholder="••••••••" />
      </div>
      <div>
        <label for="confirm">Confirmar contraseña</label>
        <input id="confirm" name="confirm" type="password" minlength="8" required placeholder="••••••••" />
      </div>
      <button id="submit" type="submit">Cambiar contraseña</button>
    </form>

    <p id="help" class="hint hidden">
      ¿No ves el formulario? Abre este enlace desde el correo de recuperación y asegúrate
      de que la URL coincide con esta página.
    </p>
  </main>

  <!-- Módulo específico para esta página -->
  <script type="module" src="./reset-password.js"></script>
</body>
</html>
