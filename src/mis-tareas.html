<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mis tareas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#3ecf8e; --border:#333; --bg:#121212; --card:#1e1e1e; --text:#fff; }
    body { font-family: 'Inter', system-ui; background:var(--bg); color:var(--text); max-width: 900px; margin: 32px auto; padding: 16px; }
    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    a { color: var(--primary); text-decoration: none; }
    .section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
    input, textarea { width:100%; background:#0d0d0d; color:#fff; border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
    textarea { min-height: 80px; resize: vertical; }
    button { background:var(--primary); color:#000; font-weight:600; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; }
    ul { list-style:none; padding:0; margin:0; }
    li { display:flex; gap:12px; justify-content:space-between; align-items:flex-start; border:1px solid var(--border); background:#1b1b1b; border-radius:10px; padding:12px; margin:10px 0; }
    .meta { opacity:.8; font-size:.9rem; }
    .title { font-weight:600; }
    .controls { display:flex; gap:8px; align-items:center; }
    .grow { flex: 1; }
  </style>
</head>
<body>
  <header>
    <h2>Mis tareas</h2>
    <nav>
      <a href="/todas-las-tareas.html">Todas</a> · <a href="/">Inicio</a>
    </nav>
  </header>

  <section class="section">
    <h3>Nueva tarea</h3>
    <input id="new-title" placeholder="Título" />
    <textarea id="new-desc" placeholder="Descripción (opcional)"></textarea>
    <div style="margin-top:8px; display:flex; gap:8px;">
      <input type="file" id="new-file" />
      <button id="btn-new">Crear</button>
    </div>
  </section>

  <section class="section">
    <h3>Listado</h3>
    <ul id="my-list"></ul>
  </section>

  <script type="module" src="/src/mis-tareas.js"></script>
</body>
</html>
